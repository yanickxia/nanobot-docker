name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest nanobot commit SHA
        id: nanobot-sha
        run: |
          SHA=$(curl -s https://api.github.com/repos/HKUDS/nanobot/commits/main | jq -r '.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Check if rebuild needed
        id: check
        run: |
          LAST_SHA=""
          if [ -f .last-built-sha ]; then
            LAST_SHA=$(cat .last-built-sha)
          fi
          if [ "$LAST_SHA" = "${{ steps.nanobot-sha.outputs.sha }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No changes in nanobot source, skipping build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "nanobot source changed, will build."
          fi

      - name: Clone nanobot source
        if: steps.check.outputs.skip == 'false'
        run: git clone https://github.com/HKUDS/nanobot.git /tmp/nanobot

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: /tmp/nanobot
          push: true
          tags: |
            ghcr.io/yanickxia/nanobot-docker:latest
            ghcr.io/yanickxia/nanobot-docker:${{ steps.nanobot-sha.outputs.sha }}

      - name: Update last built SHA
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.nanobot-sha.outputs.sha }}" > .last-built-sha
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-sha
          git commit -m "chore: update built SHA to ${{ steps.nanobot-sha.outputs.sha }}"
          git push
