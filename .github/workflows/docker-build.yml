name: Build and Push Docker Image

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if tag is unchanged'
        type: boolean
        default: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest nanobot release tag
        id: nanobot-release
        run: |
          TAG=$(curl -s https://api.github.com/repos/HKUDS/nanobot/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest nanobot release: $TAG"

      - name: Check if rebuild needed
        id: check
        run: |
          LAST_TAG=""
          if [ -f .last-built-tag ]; then
            LAST_TAG=$(cat .last-built-tag)
          fi
          if [ "$LAST_TAG" = "${{ steps.nanobot-release.outputs.tag }}" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Already built ${{ steps.nanobot-release.outputs.tag }}, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "New release ${{ steps.nanobot-release.outputs.tag }} detected, will build."
          fi

      - name: Clone nanobot at release tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git clone --depth 1 --branch ${{ steps.nanobot-release.outputs.tag }} \
            https://github.com/HKUDS/nanobot.git /tmp/nanobot

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: /tmp/nanobot
          push: true
          tags: |
            ghcr.io/yanickxia/nanobot-docker:latest
            ghcr.io/yanickxia/nanobot-docker:${{ steps.nanobot-release.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nanobot-docker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nanobot-docker:${{ steps.nanobot-release.outputs.tag }}

      - name: Update Docker Hub description
        if: steps.check.outputs.skip == 'false'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/nanobot-docker
          readme-filepath: ./README.md

      - name: Update last built tag
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.nanobot-release.outputs.tag }}" > .last-built-tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-tag
          git commit -m "chore: built nanobot ${{ steps.nanobot-release.outputs.tag }}"
          git push
